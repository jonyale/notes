<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Notes — Jon Yale</title>
<style>
  :root {
    --bg: #0E1117;
    --surface: #161B22;
    --surface-2: #1C232E;
    --rule: #262F3E;
    --ink: #E8EAF0;
    --ink-soft: #B6BCCC;
    --muted: #7C8395;
    --muted-soft: #4F5666;
    --sans: -apple-system, BlinkMacSystemFont, "Helvetica Neue", "Segoe UI Variable Display", "Segoe UI", Helvetica, Arial, system-ui, sans-serif;
    --mono: "SF Mono", "JetBrains Mono", "Fira Code", Menlo, Consolas, monospace;
  }
  * { box-sizing: border-box; }
  html { -webkit-text-size-adjust: 100%; }
  body {
    margin: 0;
    background: var(--bg);
    background-image: radial-gradient(ellipse 90% 60% at 50% -10%, rgba(255, 255, 255, 0.025) 0%, transparent 60%);
    background-attachment: fixed;
    color: var(--ink);
    font-family: var(--sans);
    font-size: 16px;
    line-height: 1.6;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    text-rendering: optimizeLegibility;
  }
  .wrap { max-width: 760px; margin: 0 auto; padding: 96px 36px; }
  @media (max-width: 720px) { .wrap { padding: 56px 20px 72px; } }
  .eyebrow {
    display: flex;
    align-items: center;
    gap: 14px;
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 0.26em;
    text-transform: uppercase;
    color: var(--muted);
    font-weight: 500;
    margin-bottom: 28px;
  }
  .eyebrow::before {
    content: "";
    display: inline-block;
    width: 32px;
    height: 1px;
    background: var(--muted);
  }
  h1 {
    font-family: var(--sans);
    font-size: clamp(2rem, 4.8vw, 2.75rem);
    line-height: 1.06;
    letter-spacing: -0.028em;
    font-weight: 600;
    margin: 0 0 18px;
    color: var(--ink);
  }
  .lede {
    font-size: clamp(1.02rem, 1.4vw, 1.14rem);
    color: var(--ink-soft);
    margin: 0 0 56px;
    max-width: 56ch;
    line-height: 1.55;
  }
  .note-list {
    list-style: none;
    padding: 0;
    margin: 0;
    display: grid;
    gap: 10px;
  }
  .note-list li {
    background: var(--surface);
    border: 1px solid var(--rule);
    border-radius: 8px;
    transition: background 0.12s ease, border-color 0.12s ease;
  }
  .note-list li:hover {
    background: var(--surface-2);
    border-color: var(--muted-soft);
  }
  .note-list a {
    display: grid;
    grid-template-columns: auto 1fr auto;
    gap: 20px;
    align-items: center;
    padding: 18px 22px;
    color: var(--ink);
    text-decoration: none;
  }
  .note-list .n-date {
    font-family: var(--mono);
    font-size: 12px;
    color: var(--muted);
    letter-spacing: 0.04em;
    min-width: 86px;
    font-variant-numeric: tabular-nums;
  }
  .note-list .n-title {
    font-size: 16px;
    color: var(--ink);
    font-weight: 500;
  }
  .note-list .n-arrow {
    font-family: var(--mono);
    color: var(--muted);
    font-size: 14px;
    transition: transform 0.15s ease, color 0.15s ease;
  }
  .note-list li:hover .n-arrow { color: var(--ink); transform: translateX(3px); }
  @media (max-width: 560px) {
    .note-list a {
      grid-template-columns: auto auto;
      grid-template-rows: auto auto;
      gap: 6px 12px;
    }
    .note-list .n-date { grid-row: 1; grid-column: 1; }
    .note-list .n-arrow { grid-row: 1; grid-column: 2; justify-self: end; }
    .note-list .n-title { grid-row: 2; grid-column: 1 / -1; }
  }
  .footer {
    margin-top: 96px;
    padding-top: 24px;
    border-top: 1px solid var(--rule);
    font-size: 13px;
    color: var(--muted);
  }
  .footer a {
    color: var(--muted);
    border-bottom: 1px solid var(--muted-soft);
    text-decoration: none;
    transition: color 0.12s ease, border-color 0.12s ease;
  }
  .footer a:hover { color: var(--ink-soft); border-bottom-color: var(--ink-soft); }
</style>
</head>
<body>
<main class="wrap">
  <div class="eyebrow">Notes</div>
  <h1>Research &amp; Synthesis</h1>
  <p class="lede">Macro research notes synthesized from podcasts, interviews, and other source material.</p>

  <ul class="note-list">
    <li>
      <a href="2026-05-13-forward-guidance-asset-positioning-synthesis.html">
        <span class="n-date">2026-05-13</span>
        <span class="n-title">Forward Guidance Asset Positioning</span>
        <span class="n-arrow">→</span>
      </a>
    </li>
  </ul>

  <div class="footer">
    <p>By <a href="https://x.com/JonYale" target="_blank" rel="noopener">Jon Yale</a></p>
  </div>
</main>
</body>
</html>
